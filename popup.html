<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    .api-key-row {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .api-key-row input { flex: 1; }
    .toggle-btn {
      padding: 8px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fafafa;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
    }
    button.save {
      width: 100%;
      padding: 9px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button.save:hover { background: #4f46e5; }
    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }
    .section-divider {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 16px 0;
    }
    .shortcut-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .shortcut-input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
      cursor: pointer;
      background: #fafafa;
      outline: none;
      user-select: none;
    }
    .shortcut-input:focus {
      border-color: #6366f1;
      background: #f0f0ff;
    }
    .shortcut-input.recording {
      border-color: #f59e0b;
      background: #fffbeb;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    button.reset-btn {
      padding: 8px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      background: #fafafa;
      cursor: pointer;
      font-size: 12px;
      flex-shrink: 0;
      color: #555;
    }
    button.reset-btn:hover { background: #f0f0f0; }
    .hint {
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Greeklish to Greek</h1>
  <p class="subtitle">Type Greeklish, get Greek</p>

  <label for="apiKey">Anthropic API Key</label>
  <div class="api-key-row">
    <input type="password" id="apiKey" placeholder="sk-ant-...">
    <button class="toggle-btn" id="toggleKey" title="Show/hide key">👁</button>
  </div>

  <button class="save" id="saveBtn">Save</button>
  <div class="status" id="status"></div>

  <hr class="section-divider">

  <label>Keyboard Shortcut</label>
  <div class="shortcut-row">
    <div class="shortcut-input" id="shortcutInput" tabindex="0">Ctrl + Shift + G</div>
    <button class="reset-btn" id="resetBtn" title="Reset to default">Default</button>
  </div>
  <p class="hint" id="shortcutHint">Click to record new shortcut</p>

  <script src="popup.js"></script>
</body>
</html>
